<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>---HOPLITE CLOUD----</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: white;
    text-align: center;
}

.container {
    max-width: 500px;
    margin: 60px auto;
    padding: 20px;
}

.logo {
    width: 120px;
    border-radius: 50%;
    margin-bottom: 15px;
}

h1 {
    margin-bottom: 30px;
    font-weight: 600;
}

.link {
    display: block;
    background: rgba(40,40,40,0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.05);
    padding: 18px;
    margin: 14px 0;
    border-radius: 14px;
    text-decoration: none;
    color: white;
    font-weight: 600;
    transition: 0.2s ease;
}

.link:hover {
    background: #2a2a2a;
    transform: scale(1.03);
}
</style>
</head>

<body>

<div class="container">
    <img src="logo.png" class="logo">

    <a href="https://discord.gg/yourinvite" class="link">Join Our Discord Server</a>
